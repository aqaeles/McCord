<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>McCord</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#36393f; color:white; }
    #loginScreen { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; }
    #loginScreen input { padding:10px; font-size:16px; margin-bottom:10px; }
    #loginScreen button { padding:10px 20px; font-size:16px; cursor:pointer; }
    #chatScreen { display:none; height:100vh; display:flex; }
    #sidebar { width:250px; background:#2f3136; padding:10px; display:flex; flex-direction:column; }
    #sidebar h3 { margin-top:0; }
    #roomList button, #friendList button { width:100%; margin:2px 0; padding:5px; background:#40444b; border:none; color:white; cursor:pointer; text-align:left; }
    #chat { flex:1; display:flex; flex-direction:column; }
    #messages { flex:1; overflow-y:auto; padding:10px; }
    .message { padding:5px 10px; margin-bottom:5px; border-radius:10px; max-width:60%; }
    .mine { background:#7289da; align-self:flex-end; }
    .other { background:#4f545c; align-self:flex-start; }
    #messageInput { padding:10px; font-size:16px; width:calc(100% - 22px); margin:5px; }
    #sendBtn { padding:10px; font-size:16px; margin:5px; cursor:pointer; width:calc(100% - 10px); }
    #newRoomInput, #newFriendInput { padding:5px; margin-bottom:5px; width:100%; }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>McCord</h1>
  <input id="usernameInput" placeholder="Kullanıcı adı girin">
  <button onclick="login()">Giriş Yap</button>
</div>

<div id="chatScreen">
  <div id="sidebar">
    <h3>Odalar</h3>
    <input id="newRoomInput" placeholder="Yeni oda adı">
    <button onclick="createRoom()">Oda Oluştur</button>
    <div id="roomList"></div>

    <h3>Arkadaşlar</h3>
    <input id="newFriendInput" placeholder="Arkadaş ara (nickname)">
    <button onclick="addFriend()">Arkadaş Ekle</button>
    <div id="friendList"></div>
  </div>

  <div id="chat">
    <ul id="messages"></ul>
    <input id="messageInput" placeholder="Mesaj yaz...">
    <button id="sendBtn" onclick="sendMessage()">Gönder</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCla8qPfq3Kk3xQeRIpRyLyGbRrVUiNddk",
    authDomain: "mccord-e9330.firebaseapp.com",
    projectId: "mccord-e9330",
    storageBucket: "mccord-e9330.firebasestorage.app",
    messagingSenderId: "879174367984",
    appId: "1:879174367984:web:6c1101d3a907fed97c2035",
    measurementId: "G-H1DDXK4ZKN"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = "";
  let currentRoom = "global";

  function login() {
    const username = document.getElementById("usernameInput").value.trim();
    if(!username) return alert("Kullanıcı adı boş olamaz!");
    currentUser = username;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "flex";
    listenRooms();
    listenFriends();
    listenMessages();
  }

  // 🔹 Rooms
  function createRoom() {
    const roomName = document.getElementById("newRoomInput").value.trim();
    if(!roomName) return;
    db.collection("rooms").doc(roomName).set({ createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    document.getElementById("newRoomInput").value = "";
  }

  function listenRooms() {
    const roomList = document.getElementById("roomList");
    db.collection("rooms").orderBy("createdAt").onSnapshot(snapshot=>{
      roomList.innerHTML = "";
      snapshot.forEach(doc=>{
        const btn = document.createElement("button");
        btn.textContent = doc.id;
        btn.onclick = ()=> { currentRoom = doc.id; listenMessages(); };
        roomList.appendChild(btn);
      });
    });
  }

  // 🔹 Friends
  function addFriend() {
    const friendName = document.getElementById("newFriendInput").value.trim();
    if(!friendName || friendName===currentUser) return;
    db.collection("users").doc(currentUser).collection("friends").doc(friendName).set({ addedAt: firebase.firestore.FieldValue.serverTimestamp() });
    document.getElementById("newFriendInput").value = "";
  }

  function listenFriends() {
    const friendList = document.getElementById("friendList");
    db.collection("users").doc(currentUser).collection("friends")
      .onSnapshot(snapshot=>{
        friendList.innerHTML = "";
        snapshot.forEach(doc=>{
          const btn = document.createElement("button");
          btn.textContent = doc.id;
          btn.onclick = ()=> { currentRoom = `private_${[currentUser,doc.id].sort().join("_")}`; listenMessages(); };
          friendList.appendChild(btn);
        });
      });
  }

  // 🔹 Messages
  let unsubscribe = null;
  function listenMessages() {
    const messagesEl = document.getElementById("messages");
    if(unsubscribe) unsubscribe();

    let col;
    if(currentRoom.startsWith("private_")) {
      col = db.collection("privateChats").doc(currentRoom).collection("messages");
    } else if(currentRoom==="global") {
      col = db.collection("globalMessages");
    } else {
      col = db.collection("rooms").doc(currentRoom).collection("messages");
    }

    unsubscribe = col.orderBy("createdAt").onSnapshot(snapshot=>{
      messagesEl.innerHTML = "";
      snapshot.forEach(doc=>{
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = `${data.user}: ${data.text}`;
        li.className = data.user===currentUser ? "message mine" : "message other";
        messagesEl.appendChild(li);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function sendMessage() {
    const text = document.getElementById("messageInput").value.trim();
    if(!text) return;

    let col;
    if(currentRoom.startsWith("private_")) {
      col = db.collection("privateChats").doc(currentRoom).collection("messages");
    } else if(currentRoom==="global") {
      col = db.collection("globalMessages");
    } else {
      col = db.collection("rooms").doc(currentRoom).collection("messages");
    }

    col.add({
      user: currentUser,
      text:text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("messageInput").value="";
  }
</script>
</body>
</html>
